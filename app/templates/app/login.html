{% extends 'app/base.html' %}

{% block content %}

<div class="card auth-card shadow p-4">

    <h1 class="text-center mb-4">
        Login
    </h1>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Username"
            >
        </div>

        <div class="mb-3">
            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Password"
            >
        </div>

        <button class="btn custom-btn w-100">
            Login
        </button>

    </form>

</div>

{% endblock %}
